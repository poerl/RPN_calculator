name: CI

on:
  push:
    branches:
      - main
    paths:
      - '**/*.kt'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.kt'

  workflow_dispatch:

jobs:
  ktlint:
    
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install JDK
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'oracle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - name: Cache gradlew cache for faster tests
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

  tests:

    runs-on: ubuntu-latest
    needs: ktlint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install JDK
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'oracle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Grant cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run tests
        run: ./gradlew test
          
      - name: Test report
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }}
        with:
          name: Tests
          path: build/test-results/test/TEST-*.xml
          reporter: java-junit
